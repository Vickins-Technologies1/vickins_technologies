name: Deploy V-Guard

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build V-Guard frontend
        working-directory: v-guard/frontend
        run: |
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build backend binary
        working-directory: v-guard/backend
        run: go build -o v-guard ./cmd/v-guard

      - name: Package artifacts
        run: |
          tar -czf v-guard-backend.tgz -C v-guard/backend v-guard
          tar -czf v-guard-frontend.tgz -C v-guard/frontend/out .

      - name: Upload backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "v-guard-backend.tgz"
          target: "/tmp"

      - name: Upload frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "v-guard-frontend.tgz"
          target: "/tmp"

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /opt/v-guard/backend/current
            sudo mkdir -p /var/www/v-guard/current
            sudo tar -xzf /tmp/v-guard-backend.tgz -C /opt/v-guard/backend/current
            sudo tar -xzf /tmp/v-guard-frontend.tgz -C /var/www/v-guard/current
            sudo chown -R vguard:vguard /opt/v-guard/backend/current
            sudo systemctl daemon-reload
            sudo systemctl restart v-guard
            sudo systemctl reload nginx
